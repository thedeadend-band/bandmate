{% extends "player/base.html" %}
{% block title %}{{ form_title }} – Admin{% endblock %}

{% block content %}
<a href="{% url 'admin_users' %}" class="back-link">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 18 9 12 15 6"/>
  </svg>
  Back to Users
</a>

<h1 class="page-title">{{ form_title }}</h1>

{% if error %}
<div class="error-message">{{ error }}</div>
{% endif %}
{% if success %}
<div class="success-message">{{ success }}</div>
{% endif %}

<form method="post" class="admin-form">
  {% csrf_token %}
  <div class="form-group">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" value="{{ form_username }}" autocomplete="off" required>
  </div>
  <div class="form-group">
    <label for="password">Password{% if edit_user %} <span class="label-hint">(leave blank to keep current)</span>{% endif %}</label>
    <input type="password" id="password" name="password" autocomplete="new-password"{% if not edit_user %} required{% endif %}>
  </div>
  <div class="form-group">
    <label class="checkbox-label">
      <input type="hidden" name="is_staff" value="0">
      <input type="checkbox" name="is_staff" value="1"{% if form_is_staff %} checked{% endif %}>
      <span class="checkbox-mark"></span>
      Admin privileges
    </label>
  </div>
  <button type="submit" class="btn btn-primary">{% if edit_user %}Save Changes{% else %}Create User{% endif %}</button>
</form>
{% endblock %}
